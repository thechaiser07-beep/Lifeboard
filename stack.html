<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<title>Daily Stack — Customizable Template</title>
<link rel="stylesheet" href="styles/stack.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="scripts/topbar.js" defer></script>
</head>
<body>

<main>
  <div class="section-title">Daily Stack</div>

  <div class="stack-card">
    <div class="stack-ticker" id="stackTicker">
      <span class="stack-ticker-dot"></span>
      <span class="stack-ticker-label">STACK</span>
      <span class="stack-ticker-sep">·</span>
      <span class="stack-ticker-msg" id="stackTickerMsg">All caught up — keep it rolling</span>
      <span class="stack-ticker-count" id="stackTickerCount">0/0</span>
    </div>

    <div class="stack-head">
      <div class="sf-eyebrow">Daily stack</div>
      <div class="sf-title">Tap each as you take it</div>
      <div class="stack-progress-text" id="stackProgressText">— / — taken today · resets at 6 AM</div>
    </div>

    <div class="stack-progress-track">
      <div id="stackProgressBar" class="stack-progress-fill"></div>
    </div>

    <div id="stackGroups"></div>

    <div class="stack-add-wrap">
      <div class="sf-eyebrow stack-add-label">Add to stack</div>
      <div class="stack-add-row">
        <div class="stack-name-wrap">
          <input id="stackAddName" type="text" placeholder="Name (e.g. B-complex)" class="stack-input" autocomplete="off" spellcheck="false" />
          <div id="stackSearchResults" class="stack-search-results" hidden></div>
        </div>
        <input id="stackAddDose" type="text" placeholder="Dose (e.g. 1 cap)" class="stack-input" />
        <select id="stackAddWindow" class="stack-input stack-select">
          <option value="morning">Morning</option>
          <option value="lunch">Lunch</option>
          <option value="evening">Evening</option>
          <option value="anytime">Anytime</option>
        </select>
        <button id="stackAddBtn" class="stack-add-btn">+ Add</button>
      </div>
    </div>
  </div>

  <div class="attribution">// editable template · all data stays in your browser</div>
</main>

<script src="scripts/supabase-config.js"></script>
<script src="scripts/stack.js"></script>
